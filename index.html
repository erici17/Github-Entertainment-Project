<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Stick Platformer</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; margin:auto; background:#111; }
#menu {
  position:absolute;
  top:40%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
}
button { padding:10px 20px; font-size:18px; }
</style>
</head>
<body>

<div id="menu">
  <h1>Stick Hero</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="1000" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");

let keys = {};
document.addEventListener("keydown", e=>{
  keys[e.key]=true;
  if(e.key==="p" || e.key==="P") togglePause();
});
document.addEventListener("keyup", e=>keys[e.key]=false);

/* ---------- GAME STATE ---------- */
let gameState="menu";
let paused=false;
let level=1;
let lives=3;
let cameraX=0;
let shake=0;

/* ---------- PHYSICS ENGINE ---------- */
const gravity=0.6;
const friction=0.8;

/* ---------- PLAYER ---------- */
class Player{
  constructor(){ this.reset(); }

  reset(){
    this.x=100;
    this.y=300;
    this.w=40;
    this.h=60;
    this.vx=0;
    this.vy=0;
    this.health=100;
    this.onGround=false;
    this.shootCooldown=0;
    this.walkCycle=0;
    this.armAngle=0;
  }

  update(){
    if(paused) return;

    if(keys["ArrowRight"]) this.vx+=0.8;
    if(keys["ArrowLeft"]) this.vx-=0.8;

    if(keys[" "] && this.onGround){
      this.vy=-12;
      this.onGround=false;
    }

    if(keys["1"] && this.shootCooldown<=0){
      bullets.push(new Bullet(this.x+20,this.y+20,this.vx>=0?1:-1,false));
      this.shootCooldown=20;
      this.armAngle=-0.8; // recoil animation
      shake=8;
    }

    this.vy+=gravity;
    this.x+=this.vx;
    this.y+=this.vy;

    this.vx*=friction;

    this.onGround=false;
    platforms.forEach(p=>{
      if(this.x < p.x+p.w &&
         this.x+this.w > p.x &&
         this.y+this.h <= p.y+20 &&
         this.y+this.h+this.vy >= p.y){
          this.y=p.y-this.h;
          this.vy=0;
          this.onGround=true;
      }
    });

    if(this.shootCooldown>0) this.shootCooldown--;

    this.walkCycle+=Math.abs(this.vx)*0.2;

    if(this.armAngle<0) this.armAngle+=0.1;
  }

  draw(){
    let x=this.x-cameraX;
    let y=this.y;

    ctx.strokeStyle="white";
    ctx.lineWidth=4;

    // head
    ctx.beginPath();
    ctx.arc(x+20,y+10,8,0,Math.PI*2);
    ctx.stroke();

    // body
    ctx.beginPath();
    ctx.moveTo(x+20,y+18);
    ctx.lineTo(x+20,y+40);
    ctx.stroke();

    // animated legs
    let legSwing=Math.sin(this.walkCycle)*10;
    ctx.beginPath();
    ctx.moveTo(x+20,y+40);
    ctx.lineTo(x+20+legSwing,y+60);
    ctx.moveTo(x+20,y+40);
    ctx.lineTo(x+20-legSwing,y+60);
    ctx.stroke();

    // animated arms
    ctx.beginPath();
    ctx.moveTo(x+20,y+25);
    ctx.lineTo(x+35*Math.cos(this.armAngle),
               y+25+35*Math.sin(this.armAngle));
    ctx.stroke();
  }
}

/* ---------- ENEMY ---------- */
class Enemy{
  constructor(x,y,isBoss=false){
    this.x=x;
    this.y=y;
    this.w=40;
    this.h=60;
    this.health=isBoss?150:40;
    this.isBoss=isBoss;
    this.vx=2;
    this.walkCycle=0;
    this.shootTimer=60;
  }

  update(){
    if(paused) return;

    if(this.isBoss){
      this.vx=(player.x<this.x?-3:3);
      if(this.health<80) this.vx*=1.5;
      if(this.shootTimer<=0){
        enemyBullets.push(new Bullet(this.x,this.y,
          player.x<this.x?-1:1,true));
        this.shootTimer=30;
        shake=5;
      }
    } else {
      this.x+=this.vx;
      if(this.x<0||this.x>2500) this.vx*=-1;

      if(this.shootTimer<=0){
        enemyBullets.push(new Bullet(this.x,this.y,this.vx>0?1:-1,true));
        this.shootTimer=120;
      }
    }

    this.walkCycle+=0.2;
    this.shootTimer--;
  }

  draw(){
    let x=this.x-cameraX;
    let y=this.y;

    ctx.strokeStyle=this.isBoss?"purple":"lightgray";
    ctx.lineWidth=4;

    ctx.beginPath();
    ctx.arc(x+20,y+10,8,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x+20,y+18);
    ctx.lineTo(x+20,y+40);
    ctx.stroke();

    let legSwing=Math.sin(this.walkCycle)*8;
    ctx.beginPath();
    ctx.moveTo(x+20,y+40);
    ctx.lineTo(x+20+legSwing,y+60);
    ctx.moveTo(x+20,y+40);
    ctx.lineTo(x+20-legSwing,y+60);
    ctx.stroke();
  }
}

/* ---------- BULLET ---------- */
class Bullet{
  constructor(x,y,dir,enemy){
    this.x=x;
    this.y=y;
    this.dir=dir;
    this.enemy=enemy;
  }
  update(){ if(!paused) this.x+=8*this.dir; }
  draw(){
    ctx.fillStyle=this.enemy?"red":"yellow";
    ctx.beginPath();
    ctx.arc(this.x-cameraX,this.y+25,5,0,Math.PI*2);
    ctx.fill();
  }
}

/* ---------- LEVELS ---------- */
let platforms=[];
let enemies=[];
let bullets=[];
let enemyBullets=[];
let player=new Player();

function loadLevel(){
  platforms=[];
  enemies=[];
  bullets=[];
  enemyBullets=[];

  platforms.push({x:0,y:450,w:3000,h:50});
  platforms.push({x:600,y:350,w:200,h:20});
  platforms.push({x:1200,y:300,w:200,h:20});

  if(level===1){
    enemies.push(new Enemy(700,390));
    enemies.push(new Enemy(900,390));
  }
  if(level===2){
    enemies.push(new Enemy(700,390));
    enemies.push(new Enemy(1000,390));
    enemies.push(new Enemy(1500,390));
  }
  if(level===3){
    enemies.push(new Enemy(1700,390,true));
  }
}

/* ---------- UPDATE ---------- */
function update(){
  if(gameState!=="play"||paused) return;

  player.update();
  enemies.forEach(e=>e.update());
  bullets.forEach(b=>b.update());
  enemyBullets.forEach(b=>b.update());

  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(b.x>e.x&&b.x<e.x+40){
        e.health-=20;
        bullets.splice(bi,1);
        shake=6;
        if(e.health<=0) enemies.splice(ei,1);
      }
    });
  });

  enemyBullets.forEach((b,bi)=>{
    if(b.x>player.x&&b.x<player.x+40){
      player.health-=10;
      enemyBullets.splice(bi,1);
      shake=10;
    }
  });

  if(enemies.length===0){
    level++;
    if(level>3){
      alert("YOU WIN!");
      restart();
    } else loadLevel();
  }

  cameraX=player.x-400;
}

/* ---------- DRAW ---------- */
function draw(){
  ctx.save();

  if(shake>0){
    ctx.translate(
      (Math.random()-0.5)*shake,
      (Math.random()-0.5)*shake
    );
    shake*=0.9;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  platforms.forEach(p=>{
    ctx.fillStyle="#654321";
    ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
  });

  player.draw();
  enemies.forEach(e=>e.draw());
  bullets.forEach(b=>b.draw());
  enemyBullets.forEach(b=>b.draw());

  ctx.fillStyle="red";
  ctx.fillRect(20,20,200,20);
  ctx.fillStyle="lime";
  ctx.fillRect(20,20,200*(player.health/100),20);

  if(paused){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("PAUSED",450,250);
  }

  ctx.restore();
}

/* ---------- LOOP ---------- */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ---------- MENU ---------- */
function startGame(){
  menu.style.display="none";
  gameState="play";
  level=1;
  player=new Player();
  loadLevel();
}
function restart(){
  level=1;
  player=new Player();
  loadLevel();
}
function togglePause(){
  if(gameState==="play") paused=!paused;
}

loop();
</script>
</body>
</html>
